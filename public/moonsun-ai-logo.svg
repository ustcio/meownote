        <path d="M0 -27.5V-21.7M0 21.7V27.5M-27.5 0H-21.7M21.7 0H27.5M-19.5 -19.5L-15.3 -15.3M15.3 15.3L19.5 19.5M19.5 -19.5L15.3 -15.3M-15.3 15.3L-19.5 19.5" stroke-width="3"/>
