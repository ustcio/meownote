<svg width="960" height="240" viewBox="0 0 960 240" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">moonsun.ai logo</title>
  <desc id="desc">Transparent vector wordmark for moonsun.ai with moon, sun, star, and infinity orbit.</desc>
  <defs>
    <linearGradient id="silverText" x1="64" y1="58" x2="800" y2="178" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF"/>
      <stop offset="0.34" stop-color="#D9DDD8"/>
      <stop offset="0.62" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#C9CEC8"/>
    </linearGradient>
    <linearGradient id="softSilver" x1="140" y1="72" x2="330" y2="152" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF"/>
      <stop offset="0.5" stop-color="#E6E8E3"/>
      <stop offset="1" stop-color="#BFC5BF"/>
    </linearGradient>
    <linearGradient id="sunCopper" x1="266" y1="74" x2="740" y2="154" gradientUnits="userSpaceOnUse">
