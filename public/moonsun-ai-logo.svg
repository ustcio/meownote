      <stop offset="0.82" stop-color="#FFFFFF" stop-opacity="1"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0.32"/>
    </linearGradient>
    <filter id="quietGlow" x="-20%" y="-35%" width="140%" height="170%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

