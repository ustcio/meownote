name = "gold-price-crawler"
main = "src/index.js"
compatibility_date = "2024-01-01"

# KV 命名空间用于缓存金价数据
# TODO: 创建 KV namespace 后替换为真实 ID: wrangler kv:namespace create "GOLD_PRICE_CACHE"
[[kv_namespaces]]
binding = "GOLD_PRICE_CACHE"
id = ""  # 替换为 wrangler kv:namespace create "GOLD_PRICE_CACHE" 输出的 ID

# 定时触发器（每分钟执行一次）
[[triggers]]
crons = ["* * * * *"]

# 环境变量
[vars]
ENVIRONMENT = "production"

# 开发环境配置
[env.development]
name = "gold-price-crawler-dev"
[[env.development.kv_namespaces]]
binding = "GOLD_PRICE_CACHE"
id = ""  # 开发环境 KV namespace ID
